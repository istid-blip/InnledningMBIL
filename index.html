        h1, h2, h3 {

        }

        .wrapper {

            text-align: center;
        }

        #selection-screen h1 {

        }

        #selection-screen .intro-text {
            font-size: 1.2rem;

        }

        .case-card:hover {

            box-shadow: 0 15px 45px rgba(0,0,0,0.15);
        }

        .case-image-placeholder {
            width: 100%;
            height: 200px;
            background-color: #ddd;
            background-size: cover;
            background-position: center;
        }

        .case-content {
            padding: 25px;
        }

        .case-content h3 {
            margin: 0 0 10px 0;
            font-size: 1.4rem;
            color: var(--primary-blue);
        }

        .case-content p {
            margin: 0;
            font-size: 1rem;
            line-height: 1.5;
            color: var(--text-body);
        }

        }

        .top-nav {
            padding: 20px 40px;
            background: #fff;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--text-body);
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
            padding: 0;
        }

        .back-btn:hover {
            color: var(--primary-blue);
        }

        /* --- FANER (TABS) --- */
        .tabs-container {
            display: flex;
            border-bottom: 2px solid var(--border-color);
            background: #fafbfc;
        }

        .tab-btn {
            flex: 1;
            padding: 20px;
            background: none;
            border: none;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-body);

        .tab-btn:hover {
            background: #f1f5f9;
            color: var(--primary-blue);
        }

        .tab-btn.active {
            color: var(--primary-blue);
            border-bottom-color: var(--accent-blue);

        }

        .tab-content {
            display: none;
            padding: 40px;
        }

        .tab-content.active {

            margin-bottom: 30px;

        .article-header h2 {

            margin-bottom: 40px;
            border: 1px solid var(--border-color);

        .audio-container p {

            font-weight: 700;
            font-size: 0.9rem;
            color: var(--text-body);

        .audio-player {
            width: 100%;

        /* Editorial Article Styling */
        .article-body {
            font-family: 'Merriweather', serif; /* Serif for bedre lesbarhet i lange tekster */

            line-height: 1.8;
            color: #333;
            max-width: 800px;
            margin: 0 auto;

        .article-body p {
            margin-bottom: 25px;

            color: var(--primary-blue);
            font-size: 1.6rem;

        .article-body img {

        .image-grid-2 {

            grid-template-columns: 1fr; /* Stables på mobil */

            margin: 40px 0;

        @media (min-width: 768px) {
            .image-grid-2 {
                grid-template-columns: 1fr 1fr; /* Side-om-side på desktop */

        .image-grid-2 img {

        }

        .article-image {

            border-radius: 12px;

            background-color: #eee;
            height: 350px; /* Placeholder høyde */

        .reflection-container {
            max-width: 800px;

        }

        .reflection-prompt {
            background: var(--primary-blue);
            color: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .reflection-prompt h3 {
            margin: 0 0 15px 0;
            font-size: 1.5rem;
        }

        .reflection-prompt p {
            margin: 0;
            font-size: 1.1rem;

        .reflection-form textarea:focus {

        .submit-btn {

            border: none;

            font-size: 1.1rem;
            font-weight: bold;

            cursor: pointer;
            transition: background 0.3s, transform 0.1s;

        }

        .submit-btn:hover {

        }

        .submit-btn:active {

        }

        .save-feedback {
            display: inline-block;
            margin-left: 15px;
            color: #38a169;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
        }

    </style>
</head>

<script>
    // --- DATASTRUKTUR ---
    // Her legger du inn hele artikkelteksten og refleksjonsspørsmålene dine.
    const caseData = {
        comet: {
            title: "De Havilland DH. 106 Comet",
            tags: ["Metallutmatting", "Trykkabin", "Syklisk belastning"],
            audioFile: "de_haviland_comet.mp3",
            
            // Artikkel-innhold (HTML-formatert for rik tekst)
            articleHtml: `
<div id="dp-wrapper" class="dp-wrapper">
    <p>Denne artikkelen sammenfatter de offisielle havarirapportene for De Havilland Comet-flyene G-ALYV, G-ALYP og G-ALYY. Dokumentene beskriver hvordan luftfartsindustrien gjennom disse hendelsene ble kjent med fenomenet metallutmatting i trykkabiner.</p>
    <p>Rapportene dekker tre separate totalhavarier som fant sted over en periode p&aring; under ett &aring;r. Mens den f&oslash;rste ulykken opprinnelig ble tilskrevet v&aelig;rforhold, f&oslash;rte de to p&aring;f&oslash;lgende ulykkene til en omfattende teknisk revurdering av flytypens konstruksjon.</p>
    
    <h4>Del 1: G-ALYV &ndash; Strukturell svikt i uv&aelig;r</h4>
    <img src="https://fagskoleninord.instructure.com/courses/2461/files/431660/preview" alt="Ministry of Civil Aviation Report C.A.P. 112 (G-ALYV)" data-api-endpoint="https://fagskoleninord.instructure.com/api/v1/courses/2461/files/431660" data-api-returntype="File" />
    
    <p>Den f&oslash;rste hendelsen involverte flyet G-ALYV som tok av fra Calcutta p&aring; vei mot Delhi. Kort tid etter avgang fra flyplassen fl&oslash;y maskinen inn i et omr&aring;de med tordenstormer, all kommunikasjon opph&oslash;rte, og flyet styrtet.</p>
    <p>Vrakrestene ble funnet spredt over et stort omr&aring;de, noe som indikerte at flyet hadde g&aring;tt i oppl&oslash;sning mens det fortsatt var i luften, viktige deler av halepartiet og ytre vingeseksjoner ble funnet separert fra hovedvraket. Det ble observert brannskader p&aring; vraket, men ingen tegn til eksplosjon f&oslash;r selve sammenst&oslash;tet med bakken.</p>
    <p>Granskingskommisjonen konkluderte med at ulykken skyldtes svikt i flyets struktur (&laquo;structural failure&raquo;). Rapporten pekte p&aring; at flyet hadde blitt utsatt for krefter som oversteg konstruksjonens t&aring;leevne. &Aring;rsaken til denne overbelastningen ble vurdert til &aring; v&aelig;re en kombinasjon av kraftige vertikale vindkast i tordenstormen og pilotens bruk av rorene for &aring; korrigere flyets stilling under de vanskelige forholdene.</p>
    <p>Det er vesentlig &aring; merke seg at rapporten fra 1953 spesifikt utelukket feil ved designet eller materialene. P&aring; dette tidspunktet ble ikke utmatting i skroget vurdert som en faktor, og ulykken ble kategorisert som for&aring;rsaket av eksterne krefter (v&aelig;r).</p>
    
    <h4>Del 2: G-ALYP og G-ALYY &ndash; Havarier i klart v&aelig;r</h4>
    <img src="https://fagskoleninord.instructure.com/courses/2461/files/431661/preview" alt="Civil Aviation Report C.A.P. 127 (G-ALYP &amp; G-ALYY)" data-api-endpoint="https://fagskoleninord.instructure.com/api/v1/courses/2461/files/431661" data-api-returntype="File" />
    
    <p>De to neste ulykkene endret forst&aring;elsen av problemet fundamentalt.</p>
    <p>Flyet G-ALYP tok av fra Roma i klart v&aelig;r. Under normal stigning mot marsjh&oslash;yde opph&oslash;rte radiokontakten br&aring;tt midt i kommunikasjonen mellom t&aring;rnet og flyet. Vitner observerte vrakrester som falt i havet like s&oslash;r for &oslash;yen Elba. Omfattende berging av vrakdeler fra havbunnen viste at flyet hadde brutt sammen i luften.</p>
    <p>Bare uker etter at Comet-fl&aring;ten hadde gjenopptatt flyvninger etter ulykken ved Elba, skjedde en nesten identisk hendelse. G-ALYY tok av fra Roma, klatret i klart v&aelig;r, og forsvant. Ingen n&oslash;dsignaler ble sendt. Da ulykken skjedde p&aring; dypt vann, ble ikke vraket hevet, men likhetene med G-ALYP gjorde at etterforskerne antok samme &aring;rsak.</p>
    <p>Frav&aelig;ret av d&aring;rlig v&aelig;r i disse to tilfellene eliminerte storm som &aring;rsaksforklaring. Oppmerksomheten ble derfor rettet mot flyets konstruksjon, spesielt trykkabinen.</p>
    
    <img src="https://fagskoleninord.instructure.com/courses/2461/files/431639/preview" alt="image.png" data-api-endpoint="https://fagskoleninord.instructure.com/api/v1/courses/2461/files/431639" data-api-returntype="File" />
    
    <h4>Del 3: Teknisk granskning</h4>
    <img src="https://fagskoleninord.instructure.com/courses/2461/files/431659/preview" alt="image.png" data-api-endpoint="https://fagskoleninord.instructure.com/api/v1/courses/2461/files/431659" data-api-returntype="File" />
    
    <p>For &aring; isolere &aring;rsaken ble det igangsatt en omfattende gransking ved Royal Aircraft Establishment (RAE). Et testfly av samme type ble plassert i en vanntank for &aring; simulere belastningene et flyskrog utsettes for n&aring;r det beveger seg fra bakkeniv&aring; til den tynne atmosf&aelig;ren i h&oslash;yden. Ved &aring; fylle tanken og skroget med vann, og deretter &oslash;ke og senke trykket inne i skroget, kunne ingeni&oslash;rene simulere syklusen med denne trykksettingen og avlastningen.</p>
    <p>Etter et antall sykluser som tilsvarte omtrent 9 000 flytimer, oppsto det en revne i trykkabinen p&aring; testflyet. Revnen startet ved hj&oslash;rnet av et vindu og f&oslash;rte til en umiddelbar og omfattende svikt i strukturen. Dette samsvarte med funnene fra vraket av G-ALYP, hvor bruddflater indikerte at svikten hadde startet ved en skroggjennomf&oslash;ring (ADF-antenne &laquo;vinduet&raquo; p&aring; taket).</p>
    
    <!-- GRID: To bilder side-om-side -->
    <div class="image-grid-2">
        <img src="https://fagskoleninord.instructure.com/courses/2461/files/431643/preview" alt="image.png" data-api-endpoint="https://fagskoleninord.instructure.com/api/v1/courses/2461/files/431643" data-api-returntype="File" />
        <img src="https://fagskoleninord.instructure.com/courses/2461/files/431640/preview" alt="image.png" data-api-endpoint="https://fagskoleninord.instructure.com/api/v1/courses/2461/files/431640" data-api-returntype="File" />
    </div>

    <p>Rapporten fra RAE identifiserer utmatting (eng: fatigue) i skroget som den direkte &aring;rsaken til ulykkene med G-ALYP og G-ALYY. Her er det&nbsp;to viktige punkter &aring; ta med seg:</p>
    <ul>
        <li>Spenningene (eng: stress) i metallet hoper seg opp i skroggjennomf&oslash;ringer. Under normalt kabintrykk n&aelig;rmet spenningen seg materialets flytegrense.</li>
        <li>Naglehullene rundt skroggjennomf&oslash;ringene har sannsynligvis fungert som initieringspunkter for sprekker. Granskingen indikerer indikasjon p&aring; utmatting rundt disse hullene.</li>
    </ul>
    <p>Et sentralt sp&oslash;rsm&aring;l er hvorfor dette ikke ble oppdaget f&oslash;r flyet ble godkjent. Rapporten forklarer at en testseksjon av flyet tidligere hadde best&aring;tt tester med langt flere sykluser enn ulykkesflyene. &Aring;rsaken til dette er i f&oslash;lge rapporten et tredje viktig poeng som vi skal ta med oss videre i dette faget.</p>
    <p>Testseksjonen hadde f&oslash;rst gjennomg&aring;tt en test med sv&aelig;rt h&oslash;yt overtrykk (nesten det dobbelte av normalt). Denne overbelastningen f&oslash;rte trolig til at metallet rundt vinduene ble strukket (plastisk deformasjon) og endret spenningsfordelingen lokalt. Dette gjorde paradoksalt nok testseksjonen sterkere mot utmatting enn de vanlige produksjonsflyene, som ikke hadde gjennomg&aring;tt en slik h&oslash;y overbelastning f&oslash;r bruk. Resultatet var at den opprinnelige testen gav en falsk trygghet om flyets levetid.</p>
    
    <div class="lesson-box">
        <h4>Kilder og fullstendige rapporter</h4>
        <p><a class="instructure_file_link" title="G-ALYV.pdf" href="https://fagskoleninord.instructure.com/courses/2461/files/431687?wrap=1" target="_blank" rel="noopener">Ministry of Civil Aviation Report C.A.P. 112 (G-ALYV)</a><br><br><a class="instructure_file_link" title="G-ALYP.pdf" href="https://fagskoleninord.instructure.com/courses/2461/files/431688?wrap=1" target="_blank" rel="noopener">Ministry of Transport and Civil Aviation Report C.A.P. 127 (G-ALYP &amp; G-ALYY)</a></p>
    </div>
</div>
            `,
            
            // Refleksjonsspørsmål
            reflectionPrompt: `
                <h3>Refleksjon: Testing vs. Virkelighet</h3>
                <p>Comet-ulykkene viste oss faren ved at testmiljøet (ekstremt overtrykk) endret materialegenskapene på en måte som skjulte det virkelige problemet. <br><br>Hvis du skulle designet en testrigg for et nytt flyskrog i dag, hvordan ville du sikret at testen reflekterer de faktiske påkjenningene flyet utsettes for gjennom et helt liv i drift?</p>
            `
        },

        aloha: {
            title: "Aloha Flight 243",
            tags: ["Korrosjon", "MSD", "Vedlikehold"],
            audioFile: "aloha_flight_243.mp3",
            articleHtml: `
                <p>Sett inn din artikkeltekst om Aloha Flight 243 her...</p>
                <div class="lesson-box">
                    <h4>Viktig lærdom for industrien</h4>
                    <p>Miljøfaktorer som fukt og saltvann i kombinasjon med mange flytimer krever ekstreme inspeksjonsrutiner for å fange opp Multiple Site Damage (MSD).</p>

            reflectionPrompt: `
                <h3>Refleksjon: Det aldrende flyet</h3>
                <p>Hvilke utfordringer oppstår i vedlikeholdsprogrammet når et fly opereres i varme og fuktige kystmiljøer sammenlignet med et tørt innlandsklima?</p>
            `
        },

        superpuma: {
            title: "Airbus Super Puma",
            tags: ["Planetgir", "Sub-surface", "Sensorikk"],
            audioFile: "airbus_super_puma.mp3",
            articleHtml: `
                <p>Sett inn din artikkeltekst om Turøy-ulykken og Super Puma her...</p>
                <div class="lesson-box">
                    <h4>Viktig lærdom for industrien</h4>
                    <p>Selv de mest avanserte magnetsensorene (chip detectors) og vibrasjonsanalysene kan ha blindsoner hvis utmattingssprekken vokser under overflaten uten å frigjøre spon.</p>
                </div>
            `,
            reflectionPrompt: `
                <h3>Refleksjon: Sensorikkens begrensninger</h3>
                <p>Når moderne overvåkingssystemer gir oss falsk trygghet, hvordan kan vi som flyingeniører fange opp feil som vokser "usynlig" inne i et materialkomponent?</p>

    };

    // --- LOGIKK ---
    
    // Viser selve casen og bygger HTML
    function showCase(id) {
        const data = caseData[id];
        
        // 1. Bygg artikkel-fane
        const articleContainer = document.getElementById('article-content');
        const tagsHTML = data.tags.map(t => `<span class="tag">${t}</span>`).join('');
        
        articleContainer.innerHTML = `
            <div class="article-header">
                <h2>${data.title}</h2>
                <div class="tag-container">${tagsHTML}</div>
            </div>
            
            ${data.audioFile ? `
            <div class="audio-container">
                <p>🎧 Lytt til rapporten</p>
                <audio class="audio-player" id="current-audio" controls>
                    <source src="${data.audioFile}" type="audio/mpeg">
                    Nettleseren din støtter ikke avspilling av lyd.
                </audio>
            </div>
            ` : ''}

            <div class="article-body">
                ${data.articleHtml}
            </div>
        `;

        // 2. Bygg refleksjons-fane
        const reflectionPromptContainer = document.getElementById('reflection-prompt');
        reflectionPromptContainer.innerHTML = data.reflectionPrompt;
        
        // Tøm tekstboksen fra tidligere (eller man kunne hentet fra localStorage her)
        document.getElementById('student-reflection').value = '';
        document.getElementById('save-msg').style.opacity = '0';

        // 3. Bytt visning og sett default fane
        document.getElementById('selection-screen').style.display = 'none';
        document.getElementById('detail-screen').style.display = 'block';
        switchTab('article'); // Alltid start på artikkelen
        window.scrollTo(0, 0);
    }

    // Returnerer til startskjermen
    function showHome() {
        // Pauser lyden hvis brukeren går tilbake
        const audioEl = document.getElementById('current-audio');
        if(audioEl) audioEl.pause();

        document.getElementById('selection-screen').style.display = 'block';
        document.getElementById('detail-screen').style.display = 'none';
    }

    // Bytter mellom Artikkel og Refleksjon
    function switchTab(tabId) {
        // Skjul alt
        document.getElementById('tab-article').classList.remove('active');
        document.getElementById('tab-reflection').classList.remove('active');
        document.getElementById('btn-article').classList.remove('active');
        document.getElementById('btn-reflection').classList.remove('active');

        // Vis valgt fane
        document.getElementById('tab-' + tabId).classList.add('active');
        document.getElementById('btn-' + tabId).classList.add('active');
        
        // Hvis brukeren går til refleksjon, settes fokus i tekstboksen
        if(tabId === 'reflection') {
            document.getElementById('student-reflection').focus();
        }
    }

    // Simulerer lagring av refleksjonsnotatet
    function saveReflection() {
        const text = document.getElementById('student-reflection').value;
        if(text.trim() === '') {
            alert('Vennligst skriv noe før du lagrer.');
            return;
        }
        
        // Her kunne man lagret teksten til en database eller LocalStorage.
        // For demonstrasjon viser vi bare en "Lagret"-bekreftelse.
        const msg = document.getElementById('save-msg');
        msg.style.opacity = '1';
        
        setTimeout(() => {
            msg.style.opacity = '0';
        }, 3000); // Skjul meldingen etter 3 sekunder
    }
</script>

</html>
